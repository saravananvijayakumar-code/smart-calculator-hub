# Google Cloud Build configuration for Smart Calculator Hub
steps:
  # Step 1: Build and deploy frontend to Cloud Storage
  - name: 'node:18'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        npm install -g bun
        bun install
        bun run build
    env:
      - 'NODE_ENV=production'
      - 'NODE_OPTIONS=--max-old-space-size=4096'

  # Step 2: Deploy frontend to Cloud Storage
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'deploy-frontend'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - '-d'
      - 'frontend/dist/'
      - 'gs://smartcalculatorhub-frontend/'
    waitFor: ['build-frontend']

  # Step 3: Set cache headers for static assets
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'set-cache-headers'
    args:
      - '-m'
      - 'setmeta'
      - '-h'
      - 'Cache-Control:public, max-age=31536000, immutable'
      - 'gs://smartcalculatorhub-frontend/assets/**'
    waitFor: ['deploy-frontend']

  # Step 4: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/calculator-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/calculator-backend:latest'
      - '.'
    waitFor: ['-']

  # Step 5: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/calculator-backend:$COMMIT_SHA'
    waitFor: ['build-backend']

  # Step 6: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'calculator-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/calculator-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'NODE_ENV=production,CORS_ORIGINS=https://smartcalculatorhubs.com'
    waitFor: ['push-backend']

# Store built images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/calculator-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/calculator-backend:latest'

# Build configuration
timeout: '1800s'  # 30 minutes
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY